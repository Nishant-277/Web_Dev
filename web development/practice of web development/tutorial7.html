<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Enities</title>
</head>
<body>
    <!-- &nbsp:- stands for non breaking space -->
    <div class="container">
        <p>This is a paragraph;</p>
    </div>
    <div class="container">
        <p>This is a example of another &nbsp; &nbsp; &nbsp; paragraph with three spaces;</p>
        <!-- &lt; &gt; is used for print tags for example given below: -->
        <p>paragraph is written like this &lt;p&gt;</p>
        <p>Pound is written like this &pound;</p>
        <p>Dollar is written like this &dollar;</p>
        <p>CopyRight is written like this &copy;</p>
        <p>this an example of blank character &#8203;</p> 
        
    </div>
</body>
</html>
