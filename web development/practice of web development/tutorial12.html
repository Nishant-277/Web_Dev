<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS fonts</title>
    <style>
        /* web safe fonts: web safe fonts are those fonts that come pre-installed with our operating system. */
        /* web fonts: web fonts are those fonts which is not installed in our operating system we have to import it. */
        h3 {
            font-family: cursive;
        }

        p {
            font-family: 'Courier New', Courier, monospace;
            font-size: 23px; /*1/96th of an inch*/
            line-height: 1.4em;
        }
        span{
            font-weight: bolder;
            font-style: oblique;
        }
    </style>

</head>

<body>
    <h3>CSS Fonts</h3>
    <p>Let's play with <span>fonts</span>. It is very exciting</p>
   
</body>

</html>
