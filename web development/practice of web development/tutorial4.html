<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<!-- 1. Form tag is used for giving a backend file name for ex. backend.php, backend.nodejs are example of forms tag  -->
<!-- 2. input is a span inline element  -->
<!-- 3. div is a block element -->
<!-- 4.  alt+shift+down arrow copy the text from selective text-->

<body>
    <h2>This is HTML forms tutorial </h2>
    <form action="backend.php">
        <label for="name">Name</label>
        <div>
            <input type="text" name="myName" id="name">
        </div>

        <br>

        <label for="roll">Roll</label>
        <div>
            <input type="text" name="myRoll" id="roll">
        </div>

        <br>

        <label for="email">Email</label>
        <div>
            <input type="email" name="myEmail" id="email">
        </div>

        <br>

        <label for="date">Date</label>
        <div>
            <input type="date" name="myDate" id="date">
        </div>

        <br>
        <label for="gender">Gender</label>
        <div>
            Male<input type="radio" name="myGender">
            Female<input type="radio" name="myGender">
            Other<input type="radio" name="myGender">
        </div>

        <br>
        <label for="bonous">Bonous</label>
        <div>
            <input type="number" name="myBonus" id="bonous">
        </div>

        <br>

        <label for="eligibility"> Are you eligible? </label>
        <div>
            <input type="checkbox" name="myEligibility" id="eligibility">
        </div>

        <br>


        <div>
            Write About yourselef: <br> <textarea name="myText" cols="30" rows="10"></textarea>
        </div>
        <br>


        <div>
            <label for="car">car</label>
            <select name="mycar" id="car">
                <option value=""></option>
                <option value="ind">Indica</option>
                <option value="swf">Swift</option>
                <option value="tata">Tata</option>
                <option value="wag">Wagnar</option>


            </select>
        </div>

        <br>

        <div>
            <input type="submit" value="Submit Now">
            <input type="reset" value="Reset Now">
        </div>

    </form>
</body>

</html>
